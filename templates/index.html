<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice to Slides</title>
  <style>
    /* ── Reset & Base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #1E3A5F;
      --accent:    #2E86AB;
      --light:     #A8DADC;
      --white:     #FFFFFF;
      --bg:        #F4F8FB;
      --card:      #FFFFFF;
      --text:      #1A1A2E;
      --muted:     #4A5568;
      --border:    #CBD5E0;
      --red:       #E53E3E;
      --green:     #38A169;
      --radius:    12px;
      --shadow:    0 4px 20px rgba(30,58,95,.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ────────────────────────────────────────────────────── */
    header {
      background: var(--primary);
      color: var(--white);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.2);
    }
    header .logo { font-size: 28px; }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
    header span { font-size: 13px; opacity: .7; margin-left: auto; }

    /* ── Main Layout ───────────────────────────────────────────────── */
    main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
      width: 100%;
    }

    /* ── Cards ─────────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 24px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Record Button ─────────────────────────────────────────────── */
    .record-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 12px 0;
    }

    #recordBtn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 36px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, background .2s;
      box-shadow: 0 4px 16px rgba(46,134,171,.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #recordBtn:hover { transform: scale(1.06); box-shadow: 0 6px 24px rgba(46,134,171,.5); }
    #recordBtn.recording {
      background: var(--red);
      animation: pulse 1.4s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(229,62,62,.4);
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(229,62,62,.5); }
      70%  { box-shadow: 0 0 0 16px rgba(229,62,62,0); }
      100% { box-shadow: 0 0 0 0 rgba(229,62,62,0); }
    }

    #recordLabel {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
    }

    /* ── Timer ─────────────────────────────────────────────────────── */
    #timer {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--primary);
      min-height: 30px;
    }

    /* ── Transcript Box ────────────────────────────────────────────── */
    #transcriptBox {
      width: 100%;
      min-height: 110px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
      resize: vertical;
      font-family: inherit;
      transition: border-color .2s;
    }
    #transcriptBox:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(46,134,171,.15);
    }

    /* ── Buttons ───────────────────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .btn {
      padding: 10px 22px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 8px rgba(46,134,171,.35);
    }
    .btn-primary:hover { background: #256d8a; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    .btn-success {
      background: var(--green);
      color: white;
      box-shadow: 0 2px 8px rgba(56,161,105,.35);
    }
    .btn-success:hover { background: #2f855a; }
    .btn-success:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Status Bar ────────────────────────────────────────────────── */
    #statusBar {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 500;
      display: none;
      margin-top: 12px;
    }
    #statusBar.info    { background: #EBF8FF; color: #2B6CB0; display: block; }
    #statusBar.error   { background: #FFF5F5; color: var(--red); display: block; }
    #statusBar.success { background: #F0FFF4; color: var(--green); display: block; }

    /* ── Spinner ───────────────────────────────────────────────────── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Slide Preview ─────────────────────────────────────────────── */
    #slidePreview { display: none; }

    .slide-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      margin-top: 8px;
    }

    .slide-card {
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(30,58,95,.12);
      border: 1.5px solid var(--border);
      transition: transform .15s, box-shadow .15s;
      cursor: default;
    }
    .slide-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(30,58,95,.18); }

    .slide-title-card { background: var(--primary); }
    .slide-content-card { background: var(--bg); }

    .slide-header {
      padding: 20px 18px 14px;
    }
    .slide-title-card .slide-header { background: var(--primary); }
    .slide-content-card .slide-header {
      background: var(--primary);
      padding: 10px 16px;
    }

    .slide-num {
      font-size: 10px;
      font-weight: 700;
      color: var(--light);
      letter-spacing: .6px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .slide-title-text {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.3;
    }

    .slide-subtitle {
      font-size: 12px;
      color: var(--light);
      margin-top: 6px;
    }

    .slide-body {
      padding: 14px 16px;
    }

    .slide-bullet {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 5px 0;
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
      border-bottom: 1px solid var(--border);
    }
    .slide-bullet:last-child { border-bottom: none; }
    .slide-bullet::before {
      content: "▸";
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Footer ────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 18px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🎙️</span>
  <h1>Voice to Slides</h1>
  <span>Powered by Claude AI</span>
</header>

<main>

  <!-- Step 1: Record -->
  <div class="card">
    <div class="card-title">① Record Your Voice</div>
    <div class="record-center">
      <button id="recordBtn" title="Click to start/stop recording">🎙️</button>
      <div id="timer"></div>
      <div id="recordLabel">Click to start recording</div>
    </div>
  </div>

  <!-- Step 2: Transcript -->
  <div class="card">
    <div class="card-title">② Review & Edit Transcript</div>
    <textarea id="transcriptBox" placeholder="Your transcript will appear here after recording. You can also type or paste text directly..."></textarea>
    <div id="statusBar"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="generateBtn" disabled>
        ✨ Generate Slides
      </button>
      <button class="btn btn-outline" id="clearBtn">
        🗑 Clear
      </button>
    </div>
  </div>

  <!-- Step 3: Preview + Download -->
  <div class="card" id="slidePreview">
    <div class="card-title">③ Slide Preview</div>
    <div class="btn-row" style="margin-bottom:18px">
      <button class="btn btn-success" id="downloadBtn">
        ⬇️ Download .pptx
      </button>
      <button class="btn btn-outline" id="regenerateBtn">
        🔄 Re-generate
      </button>
    </div>
    <div class="slide-grid" id="slideGrid"></div>
  </div>

</main>

<footer>Voice to Slides &nbsp;•&nbsp; Built with Flask + Claude API</footer>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let mediaRecorder = null;
let audioChunks  = [];
let timerInterval = null;
let seconds = 0;
let currentSlides = [];

// ── DOM refs ───────────────────────────────────────────────────────────────
const recordBtn    = document.getElementById("recordBtn");
const recordLabel  = document.getElementById("recordLabel");
const timerEl      = document.getElementById("timer");
const transcriptBox= document.getElementById("transcriptBox");
const statusBar    = document.getElementById("statusBar");
const generateBtn  = document.getElementById("generateBtn");
const clearBtn     = document.getElementById("clearBtn");
const slidePreview = document.getElementById("slidePreview");
const slideGrid    = document.getElementById("slideGrid");
const downloadBtn  = document.getElementById("downloadBtn");
const regenerateBtn= document.getElementById("regenerateBtn");

// ── Helpers ────────────────────────────────────────────────────────────────
function setStatus(msg, type = "info") {
  statusBar.textContent = msg;
  statusBar.className   = type;
}
function clearStatus() { statusBar.className = ""; statusBar.textContent = ""; }

function pad(n) { return String(n).padStart(2, "0"); }
function fmtTime(s) { return `${pad(Math.floor(s/60))}:${pad(s%60)}`; }

function startTimer() {
  seconds = 0;
  timerEl.textContent = fmtTime(0);
  timerInterval = setInterval(() => { timerEl.textContent = fmtTime(++seconds); }, 1000);
}
function stopTimer() { clearInterval(timerInterval); timerEl.textContent = ""; }

// Enable generate button when there's text
transcriptBox.addEventListener("input", () => {
  generateBtn.disabled = !transcriptBox.value.trim();
});

// ── Recording ──────────────────────────────────────────────────────────────
recordBtn.addEventListener("click", async () => {
  if (mediaRecorder && mediaRecorder.state === "recording") {
    // Stop
    mediaRecorder.stop();
    recordBtn.classList.remove("recording");
    recordBtn.textContent = "🎙️";
    recordLabel.textContent = "Processing audio…";
    stopTimer();
    return;
  }

  // Start
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: "audio/wav" });
      await sendAudioForTranscription(blob);
    };

    mediaRecorder.start(250);
    recordBtn.classList.add("recording");
    recordBtn.textContent = "⏹";
    recordLabel.textContent = "Recording… click to stop";
    startTimer();
    clearStatus();
  } catch (err) {
    setStatus("Microphone access denied: " + err.message, "error");
  }
});

async function sendAudioForTranscription(blob) {
  setStatus("⏳ Transcribing audio…", "info");
  recordLabel.textContent = "Click to start recording";

  const formData = new FormData();
  formData.append("audio", blob, "recording.wav");

  try {
    const res  = await fetch("/transcribe", { method: "POST", body: formData });
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    transcriptBox.value = data.transcript;
    generateBtn.disabled = false;
    setStatus("✅ Transcription complete! Review & edit above, then generate slides.", "success");
  } catch (err) {
    setStatus("Transcription error: " + err.message, "error");
    recordLabel.textContent = "Click to start recording";
  }
}

// ── Generate Slides ────────────────────────────────────────────────────────
async function generateSlides() {
  const transcript = transcriptBox.value.trim();
  if (!transcript) return;

  generateBtn.disabled = true;
  generateBtn.innerHTML = `<span class="spinner"></span> Generating…`;
  setStatus("⏳ Claude is structuring your slides…", "info");
  slidePreview.style.display = "none";

  try {
    const res  = await fetch("/generate", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ transcript })
    });
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    currentSlides = data.slides;
    renderPreview(currentSlides);
    setStatus("✅ Slides ready! Preview below — download when happy.", "success");
    slidePreview.style.display = "block";
    slidePreview.scrollIntoView({ behavior: "smooth" });
  } catch (err) {
    setStatus("Generation error: " + err.message, "error");
  } finally {
    generateBtn.disabled = false;
    generateBtn.innerHTML = "✨ Generate Slides";
  }
}

generateBtn.addEventListener("click", generateSlides);
regenerateBtn.addEventListener("click", generateSlides);

// ── Render Preview ─────────────────────────────────────────────────────────
function renderPreview(slides) {
  slideGrid.innerHTML = "";

  slides.forEach((slide, i) => {
    const card = document.createElement("div");
    card.className = slide.type === "title"
      ? "slide-card slide-title-card"
      : "slide-card slide-content-card";

    const header = document.createElement("div");
    header.className = "slide-header";

    const numEl = document.createElement("div");
    numEl.className = "slide-num";
    numEl.textContent = slide.type === "title" ? "TITLE SLIDE" : `SLIDE ${i}`;

    const titleEl = document.createElement("div");
    titleEl.className = "slide-title-text";
    titleEl.textContent = slide.title || "";

    header.appendChild(numEl);
    header.appendChild(titleEl);

    if (slide.subtitle) {
      const sub = document.createElement("div");
      sub.className = "slide-subtitle";
      sub.textContent = slide.subtitle;
      header.appendChild(sub);
    }

    card.appendChild(header);

    if (slide.bullets && slide.bullets.length) {
      const body = document.createElement("div");
      body.className = "slide-body";

      slide.bullets.forEach(b => {
        const bEl = document.createElement("div");
        bEl.className = "slide-bullet";
        bEl.textContent = b;
        body.appendChild(bEl);
      });

      card.appendChild(body);
    }

    slideGrid.appendChild(card);
  });
}

// ── Download ───────────────────────────────────────────────────────────────
downloadBtn.addEventListener("click", async () => {
  if (!currentSlides.length) return;

  downloadBtn.disabled = true;
  downloadBtn.innerHTML = `<span class="spinner"></span> Building…`;

  try {
    const res = await fetch("/download", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ slides: currentSlides })
    });

    if (!res.ok) throw new Error("Download failed");

    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = "presentation.pptx";
    a.click();
    URL.revokeObjectURL(url);
    setStatus("✅ File downloaded!", "success");
  } catch (err) {
    setStatus("Download error: " + err.message, "error");
  } finally {
    downloadBtn.disabled = false;
    downloadBtn.innerHTML = "⬇️ Download .pptx";
  }
});

// ── Clear ──────────────────────────────────────────────────────────────────
clearBtn.addEventListener("click", () => {
  transcriptBox.value = "";
  generateBtn.disabled = true;
  clearStatus();
  slidePreview.style.display = "none";
  currentSlides = [];
});
</script>
</body>
</html>
